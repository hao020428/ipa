name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Prepare Build Environment by Cloning Missing Deps
        run: |
          # The submodule checkout is unreliable, so we clone it manually.
          git clone https://github.com/MJNONCS/KittyMemory.git deps/KittyMemory/
          echo "Copying all dependencies into a local 'includes' directory to bypass Theos path issues..."
          mkdir -p Tweak/includes
          # Copy all dependency headers into the local includes directory
          cp -R deps/KittyMemory/KittyMemory/* Tweak/includes/
          cp -R deps/fmt Tweak/includes/
          cp -R deps/hash Tweak/includes/
          cp -R deps/nlohmann Tweak/includes/
          cp -R deps/SSZipArchive Tweak/includes/
          cp -R deps/utfcpp Tweak/includes/
          echo "Done copying dependencies."
        shell: bash

      - name: Debug File System Before Copy
        run: |
          echo "--- Current Working Directory: $(pwd) ---"
          echo "--- Listing contents of 'deps' directory only ---"
          ls -laR deps
          echo "------------------------------------------------"
        shell: bash

      - name: Create Correct Makefile
        run: |
          cat > Tweak/Makefile << 'EOF'
          TARGET := iphone:clang:17.5:11.2
          ARCHS = arm64 arm64e
          THEOS_PACKAGE_SCHEME = rootless

          TWEAK_NAME = UEDumper

          # List ALL source files explicitly to avoid wildcard issues
          UEDumper_FILES = \
              src/Tweak.mm \
              src/Dumper.cpp \
              src/UPackageGenerator.cpp \
              src/UE/UEGameProfile.cpp \
              src/UE/UEMemory.cpp \
              src/UE/UEOffsets.cpp \
              src/UE/UEWrappers.cpp \
              src/Utils/AlertUtils.mm \
              src/Utils/BufferFmt.cpp \
              src/Utils/KittyAlertView.mm \
              includes/SSZipArchive/SSZipArchive.m

          # Add minizip source files to be compiled with the tweak
          UEDumper_FILES += \
              includes/SSZipArchive/minizip/mz_crypt.c \
              includes/SSZipArchive/minizip/mz_os.c \
              includes/SSZipArchive/minizip/mz_strm.c \
              includes/SSZipArchive/minizip/mz_zip.c \
              includes/SSZipArchive/minizip/mz_zip_rw.c \
              includes/SSZipArchive/minizip/mz_compat.c

          # This is the definitive solution. We provide a simple, local include
          # path that Theos cannot ignore.
          override CXXFLAGS += \
              -std=c++17 \
              -fobjc-arc-exceptions \
              -Wno-deprecated-declarations \
              -Iincludes

          override OBJCXXFLAGS += $(CXXFLAGS)
          override CFLAGS += $(CXXFLAGS)
          override OBJCFLAGS += $(CXXFLAGS)

          include $(THEOS)/makefiles/common.mk
          include $(THEOS)/makefiles/tweak.mk

          after-install::
          	install.exec "sbreload"
          EOF
        shell: bash

      - name: Build Tweak
        id: build
        run: |
          cd Tweak
          make clean all messages=yes
          echo "tweak_path=$(ls -t packages/*.deb 2>/dev/null | head -n1)" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        if: steps.build.outputs.tweak_path
        uses: actions/upload-artifact@v4
        with:
          name: UEDumper-Debian-Package
          path: Tweak/${{ steps.build.outputs.tweak_path }} 
