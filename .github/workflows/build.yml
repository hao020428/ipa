name: Build iOS_UEDumper

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Build Dependencies
        run: |
          brew install ldid xz make

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Download Missing KittyMemory Dependency
        run: |
          rm -rf deps/KittyMemory
          git clone https://github.com/MJx0/KittyMemory.git deps/KittyMemory
      
      - name: Force Overwrite Makefile with The Correct Version
        env:
          MAKEFILE_CONTENT: |
            TARGET := iphone:clang:latest:14.0
            ARCHS = arm64 arm64e
            THEOS_PACKAGE_SCHEME = rootless

            include $(THEOS)/makefiles/common.mk

            TWEAK_NAME = UEDumper

            # --- Source Files ---
            DEPS_PATH = ../deps
            
            TWEAK_SRC_FILES = \
            	src/Tweak.mm \
            	src/Dumper.cpp \
            	src/UPackageGenerator.cpp \
            	src/UE/UEGameProfile.cpp \
            	src/UE/UEMemory.cpp \
            	src/UE/UEOffsets.cpp \
            	src/UE/UEWrappers.cpp \
            	src/Utils/AlertUtils.mm \
            	src/Utils/BufferFmt.cpp \
            	src/Utils/KittyAlertView.mm

            DEPS_SRC_FILES = \
            	$(wildcard $(DEPS_PATH)/KittyMemory/*.cpp) \
            	$(DEPS_PATH)/fmt/format.cc \
            	$(DEPS_PATH)/SSZipArchive/SSZipArchive.m \
            	$(wildcard $(DEPS_PATH)/SSZipArchive/minizip/*.c)

            $(TWEAK_NAME)_FILES = $(TWEAK_SRC_FILES) $(DEPS_SRC_FILES)

            # --- Compiler Flags ---
            # Explicitly add every conceivable include path.
            ALL_INCLUDES = \
            	-I. \
            	-Isrc \
            	-I$(DEPS_PATH) \
            	-I$(DEPS_PATH)/KittyMemory \
            	-I$(DEPS_PATH)/fmt \
            	-I$(DEPS_PATH)/hash \
            	-I$(DEPS_PATH)/nlohmann \
            	-I$(DEPS_PATH)/SSZipArchive \
            	-I$(DEPS_PATH)/SSZipArchive/minizip \
            	-I$(DEPS_PATH)/utfcpp

            # Common flags for all file types
            COMMON_FLAGS = -fobjc-arc -Wno-deprecated-declarations -Wno-unused-function

            # C++-specific flags
            CPP_FLAGS = -std=c++17 -Wno-c++11-extensions -Wno-c++11-inline-namespace
            
            # C-specific flags
            C_FLAGS = -DHAVE_INTTYPES_H -DHAVE_PKCRYPT -DHAVE_STDINT_H -DHAVE_WZAES -DHAVE_ZLIB
            
            # Combine and assign to Theos variables
            $(TWEAK_NAME)_CXXFLAGS = $(COMMON_FLAGS) $(CPP_FLAGS) $(ALL_INCLUDES)
            $(TWEAK_NAME)_OBJCXXFLAGS = $(COMMON_FLAGS) $(CPP_FLAGS) $(ALL_INCLUDES)
            $(TWEAK_NAME)_CFLAGS = $(COMMON_FLAGS) $(C_FLAGS) $(ALL_INCLUDES)
            $(TWEAK_NAME)_OBJCFLAGS = $(COMMON_FLAGS) $(C_FLAGS) $(ALL_INCLUDES)

            # --- Linker Flags ---
            $(TWEAK_NAME)_LDFLAGS = -lz -liconv -ldl
            $(TWEAK_NAME)_FRAMEWORKS = UIKit Foundation Security Network QuartzCore

            # --- Final include ---
            include $(THEOS_MAKE_PATH)/tweak.mk
        run: echo "$MAKEFILE_CONTENT" > Tweak/Makefile
      
      - name: Debug File Listing
        run: |
          echo "--- Listing all files in Tweak directory ---"
          find Tweak -print
          echo "--------------------------------------------"

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          cd Tweak
          # Use gmake for better parallel builds
          gmake package THEOS=~/theos -j$(sysctl -n hw.ncpu)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UEDumper-deb
          path: Tweak/packages/*.deb
