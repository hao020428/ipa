name: Build iOS_UEDumper

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Build Dependencies
        run: |
          brew install ldid xz make

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Download Missing KittyMemory Dependency
        run: |
          rm -rf deps/KittyMemory
          git clone https://github.com/MJx0/KittyMemory.git deps/KittyMemory
      
      - name: Force Overwrite Makefile with Sledgehammer Version
        env:
          MAKEFILE_CONTENT: |
            TARGET := iphone:clang:latest:14.0
            ARCHS = arm64 arm64e
            THEOS_PACKAGE_SCHEME = rootless
            
            include $(THEOS)/makefiles/common.mk

            TWEAK_NAME = UEDumper

            # --- Source Files ---
            DEPS_PATH = ../deps
            TWEAK_SRC_FILES = $(wildcard src/*.mm) $(wildcard src/*.cpp) $(wildcard src/UE/*.cpp) $(wildcard src/Utils/*.cpp) $(wildcard src/Utils/*.mm)
            DEPS_SRC_FILES = $(wildcard $(DEPS_PATH)/KittyMemory/*.cpp) $(DEPS_PATH)/fmt/format.cc $(DEPS_PATH)/SSZipArchive/SSZipArchive.m $(wildcard $(DEPS_PATH)/SSZipArchive/minizip/*.c)
            $(TWEAK_NAME)_FILES = $(TWEAK_SRC_FILES) $(DEPS_SRC_FILES)

            # --- Sledgehammer Flags ---
            # Apply ALL necessary flags to ALL compilers to be absolutely sure.
            # Clang should ignore irrelevant flags (e.g., -std=c++17 for .c files).
            SLEDGEHAMMER_FLAGS = \
            	-std=c++17 \
            	-fobjc-arc \
            	-I$(DEPS_PATH) \
            	-I$(DEPS_PATH)/KittyMemory \
            	-I$(DEPS_PATH)/SSZipArchive \
            	-Wno-deprecated-declarations \
            	-Wno-unused-function \
            	-Wno-c++11-extensions \
            	-Wno-c++11-inline-namespace \
            	-DHAVE_INTTYPES_H -DHAVE_PKCRYPT -DHAVE_STDINT_H -DHAVE_WZAES -DHAVE_ZLIB

            $(TWEAK_NAME)_CFLAGS = $(SLEDGEHAMMER_FLAGS)
            $(TWEAK_NAME)_CXXFLAGS = $(SLEDGEHAMMER_FLAGS)
            $(TWEAK_NAME)_OBJCFLAGS = $(SLEDGEHAMMER_FLAGS)
            $(TWEAK_NAME)_OBJCXXFLAGS = $(SLEDGEHAMMER_FLAGS)

            # --- Linker Flags ---
            $(TWEAK_NAME)_LDFLAGS = -lz -liconv -ldl
            $(TWEAK_NAME)_FRAMEWORKS = UIKit Foundation Security Network QuartzCore

            # --- Final include ---
            include $(THEOS_MAKE_PATH)/tweak.mk
        run: echo "$MAKEFILE_CONTENT" > Tweak/Makefile

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          cd Tweak
          # Use gmake for better parallel builds
          gmake package THEOS=~/theos -j$(sysctl -n hw.ncpu)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UEDumper-deb
          path: Tweak/packages/*.deb
