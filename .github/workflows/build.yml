name: Build iOS UEDumper

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  build:
    runs-on: macos-latest  # 使用macOS运行器，因为这是iOS项目
    
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: 'recursive'  # 确保获取所有子模块
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '13.2'  # 选择一个适合项目的Xcode版本
    
    - name: Install dependencies
      run: |
        brew install ldid  # 用于签名iOS二进制文件
        brew install theos/tap/theos  # 安装Theos (用于越狱iOS开发)
    
    - name: Set up Theos environment
      run: |
        export THEOS=$(brew --prefix theos)
        echo "THEOS=$THEOS" >> $GITHUB_ENV
        echo "THEOS_DEVICE_IP=127.0.0.1" >> $GITHUB_ENV
        echo "THEOS_DEVICE_PORT=2222" >> $GITHUB_ENV
    
    - name: Build project
      run: |
        cd iOS_UEDumper-main/Tweak
        make package
    
    - name: Archive production artifacts
      uses: actions/upload-artifact@v2
      with:
        name: UEDumper-package
        path: |
          iOS_UEDumper-main/Tweak/packages/*.deb
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./iOS_UEDumper-main/Tweak/packages/com.yourcompany.uedumper_1.0_iphoneos-arm.deb
        asset_name: UEDumper.deb
        asset_content_type: application/vnd.debian.binary-package
