name: Build iOS_UEDumper

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Build Dependencies
        run: |
          brew install ldid xz make

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Download Missing KittyMemory Dependency
        run: |
          rm -rf deps/KittyMemory
          git clone https://github.com/MJx0/KittyMemory.git deps/KittyMemory
      
      - name: Force Overwrite Makefile with The One True Correct Version
        env:
          MAKEFILE_CONTENT: |
            TARGET := iphone:clang:latest:14.0
            ARCHS = arm64 arm64e
            THEOS_PACKAGE_SCHEME = rootless

            include $(THEOS)/makefiles/common.mk

            TWEAK_NAME = UEDumper

            # --- Source Files ---
            DEPS_PATH = ../deps
            KITTYMEMORY_PATH = $(DEPS_PATH)/KittyMemory # Corrected path

            KITTYMEMORY_SRC = $(wildcard $(KITTYMEMORY_PATH)/*.cpp)
            MINIZIP_SRC = $(wildcard $(DEPS_PATH)/SSZipArchive/minizip/*.c)
            DEPS_SRC = $(KITTYMEMORY_SRC) $(DEPS_PATH)/fmt/format.cc $(DEPS_PATH)/SSZipArchive/SSZipArchive.m $(MINIZIP_SRC)

            # Explicitly list source files, excluding ProgressUtils.cpp, matching the original's intent.
            TWEAK_SRC_FILES = \
            	src/Tweak.mm \
            	src/Dumper.cpp \
            	src/UPackageGenerator.cpp \
            	src/Utils/AlertUtils.mm \
            	src/Utils/KittyAlertView.mm \
            	src/Utils/BufferFmt.cpp \
            	$(wildcard src/UE/*.cpp)

            $(TWEAK_NAME)_FILES = $(TWEAK_SRC_FILES) $(DEPS_SRC)

            # --- Compiler Flags ---
            # Correctly set for each language, with all necessary include paths.
            COMMON_INCLUDES = -Isrc -I$(DEPS_PATH) -I$(DEPS_PATH)/KittyMemory -I$(DEPS_PATH)/SSZipArchive
            COMMON_FLAGS = -fobjc-arc -Wno-deprecated-declarations -Wno-unused-function

            C_DEFINES = -DHAVE_INTTYPES_H -DHAVE_PKCRYPT -DHAVE_STDINT_H -DHAVE_WZAES -DHAVE_ZLIB
            $(TWEAK_NAME)_CFLAGS += $(COMMON_FLAGS) $(C_DEFINES) $(COMMON_INCLUDES)

            CPP_FLAGS = -std=c++17 -O2 -DkNO_KEYSTONE -DkNO_SUBSTRATE
            $(TWEAK_NAME)_CXXFLAGS = $(COMMON_FLAGS) $(CPP_FLAGS) $(COMMON_INCLUDES)
            $(TWEAK_NAME)_OBJCXXFLAGS = $($(TWEAK_NAME)_CXXFLAGS)

            RPM_USE_MEMCPY = 1
            ifeq ($(RPM_USE_MEMCPY), 1)
                $(TWEAK_NAME)_CXXFLAGS += -DRPM_USE_MEMCPY
                $(TWEAK_NAME)_OBJCXXFLAGS += -DRPM_USE_MEMCPY
            endif

            # --- Linker Flags ---
            $(TWEAK_NAME)_LDFLAGS = -lz -liconv -ldl
            $(TWEAK_NAME)_FRAMEWORKS = UIKit Foundation Security Network QuartzCore

            # --- Final include ---
            include $(THEOS_MAKE_PATH)/tweak.mk
        run: echo "$MAKEFILE_CONTENT" > Tweak/Makefile

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          cd Tweak
          gmake package THEOS=~/theos -j$(sysctl -n hw.ncpu)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UEDumper-deb
          path: Tweak/packages/*.deb
