name: Build iOS UEDumper

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  build:
    runs-on: macos-latest  # 使用macOS运行器，因为这是iOS项目
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true  # 确保获取所有子模块
        fetch-depth: 0    # 获取完整历史
    
    - name: Ensure submodules are initialized
      run: |
        git submodule update --init --recursive
        # 检查KittyMemory是否已正确克隆
        if [ ! -f "iOS_UEDumper-main/deps/KittyMemory/KittyInclude.hpp" ] && [ -d "iOS_UEDumper-main" ]; then
          echo "KittyMemory not properly cloned, manually cloning it"
          rm -rf iOS_UEDumper-main/deps/KittyMemory
          git clone https://github.com/MJx0/KittyMemory.git iOS_UEDumper-main/deps/KittyMemory
        fi
        if [ ! -f "deps/KittyMemory/KittyInclude.hpp" ] && [ -d "deps" ]; then
          echo "KittyMemory not properly cloned at root level, manually cloning it"
          rm -rf deps/KittyMemory
          git clone https://github.com/MJx0/KittyMemory.git deps/KittyMemory
        fi
        
        # 确保所有可能的路径都有KittyMemory
        for dir in $(find . -type d -name "deps" 2>/dev/null); do
          if [ ! -d "$dir/KittyMemory" ] || [ ! -f "$dir/KittyMemory/KittyInclude.hpp" ]; then
            echo "Adding KittyMemory to $dir"
            rm -rf "$dir/KittyMemory"
            git clone https://github.com/MJx0/KittyMemory.git "$dir/KittyMemory"
          fi
        done
        
        # 列出所有KittyMemory目录内容
        find . -name "KittyMemory" -type d | xargs -I{} sh -c 'echo "Content of {}:"; ls -la {}'
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'  # 更新为更新版本的Xcode
    
    - name: Install ldid
      run: brew install ldid  # 用于签名iOS二进制文件
    
    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        brew install ldid xz
        curl -LO https://github.com/theos/sdks/archive/master.zip
        unzip -q master.zip
        mv sdks-master/*.sdk $HOME/theos/sdks/
        rm -rf sdks-master master.zip
    
    - name: Set up Theos environment
      run: |
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "THEOS_DEVICE_IP=127.0.0.1" >> $GITHUB_ENV
        echo "THEOS_DEVICE_PORT=2222" >> $GITHUB_ENV
        echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV
    
    - name: Check directory structure
      run: |
        echo "Working directory: $(pwd)"
        ls -la
        if [ -d "iOS_UEDumper-main" ]; then
          echo "Found iOS_UEDumper-main directory"
          ls -la iOS_UEDumper-main
        fi
        if [ -d "Tweak" ]; then
          echo "Found Tweak directory at root level"
          ls -la Tweak
          
          # 检查Utils目录
          if [ -d "Tweak/src/Utils" ]; then
            echo "Found Utils directory:"
            ls -la Tweak/src/Utils
          fi
        fi
        # 查找所有Tweak目录
        find . -type d -name "Tweak" | xargs -I{} echo "Found Tweak directory: {}"
        
        # 查找ProgressUtils.hpp文件
        find . -name "ProgressUtils.hpp" | xargs -I{} echo "Found ProgressUtils.hpp: {}"
    
    - name: Check include paths
      run: |
        # 查找项目中的include路径设置
        find . -name "Makefile" -exec grep -l "INCLUDES" {} \;
        find . -name "Makefile" -type f | xargs cat
    
    - name: Build project
      run: |
        # 动态查找Tweak目录
        TWEAK_DIR=$(find . -type d -name "Tweak" | head -n 1)
        if [ -z "$TWEAK_DIR" ]; then
          echo "Error: Could not find Tweak directory"
          exit 1
        fi
        echo "Found Tweak directory at: $TWEAK_DIR"
        
        # 创建临时Makefile确保包含所有必要路径
        KITTY_PATHS=$(find . -name "KittyMemory" -type d)
        if [ -n "$KITTY_PATHS" ]; then
          KITTY_PATH=$(echo "$KITTY_PATHS" | head -n 1)
          echo "Found KittyMemory at: $KITTY_PATH"
          
          # 备份原始Makefile
          if [ -f "$TWEAK_DIR/Makefile" ]; then
            cp "$TWEAK_DIR/Makefile" "$TWEAK_DIR/Makefile.bak"
            
            # 添加所有必要的include路径
            echo "" >> "$TWEAK_DIR/Makefile"
            echo "# Added by GitHub Actions" >> "$TWEAK_DIR/Makefile"
            echo "UEDumper_CFLAGS += -I$KITTY_PATH" >> "$TWEAK_DIR/Makefile"
            echo "UEDumper_CFLAGS += -I$(dirname $KITTY_PATH)" >> "$TWEAK_DIR/Makefile"
            
            # 添加Tweak的src目录到include路径（这样就可以找到Utils目录）
            echo "UEDumper_CFLAGS += -I$TWEAK_DIR" >> "$TWEAK_DIR/Makefile"
            echo "UEDumper_CFLAGS += -I$TWEAK_DIR/src" >> "$TWEAK_DIR/Makefile"
            
            # 添加其他可能需要的include路径
            echo "UEDumper_CCFLAGS += -I$TWEAK_DIR -I$TWEAK_DIR/src" >> "$TWEAK_DIR/Makefile"
            
            # 显示修改后的Makefile
            echo "Modified Makefile:"
            cat "$TWEAK_DIR/Makefile"
          fi
        fi
        
        # 检查文件和环境的更多信息
        echo "Environment variables:"
        env
        
        # 尝试编译
        cd "$TWEAK_DIR"
        make clean
        
        # 编译前额外修复可能的问题
        # 1. 创建符号链接，确保头文件可以被找到
        if [ -d "$TWEAK_DIR/src/Utils" ] && [ ! -L "$TWEAK_DIR/Utils" ]; then
          echo "Creating symlink for Utils directory"
          ln -sf "$TWEAK_DIR/src/Utils" "$TWEAK_DIR/Utils"
        fi
        
        # 2. 检查和显示关键文件
        find "$TWEAK_DIR" -name "*.hpp" | sort
        
        # 3. 直接修改源代码中的包含路径（如果必要）
        if [ -f "$TWEAK_DIR/src/Dumper.hpp" ]; then
          echo "Modifying include paths in Dumper.hpp"
          sed -i '' 's|"Utils/ProgressUtils.hpp"|"src/Utils/ProgressUtils.hpp"|g' "$TWEAK_DIR/src/Dumper.hpp"
          # 显示更改
          cat "$TWEAK_DIR/src/Dumper.hpp" | grep -A 2 -B 2 "ProgressUtils.hpp"
        fi
        
        # 最后尝试构建
        make package THEOS_PACKAGE_DIR_NAME=build
    
    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UEDumper-package
        path: |
          **/packages/*.deb
          **/build/*.deb
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/packages/*.deb
          **/build/*.deb
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false 
