# .github/workflows/build.yml

name: Build iOS_UEDumper Tweak

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 步骤 1: 检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 步骤 2: 安装 Theos 依赖
      - name: Install Dependencies
        run: |
          brew install ldid xz

      # 步骤 3: 安装 Theos 和 iOS SDK (最稳定方法)
      - name: Install Theos & SDK (Most Stable Method)
        run: |
          # 克隆 Theos
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          
          # 设置 THEOS 环境变量
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          
          # 【修正点】不再使用任何 curl 下载链接。
          # 直接从 Theos 官方 SDK 仓库用 Git 克隆一个确认可用的 SDK。
          # 这是最可靠的方法，因为它不依赖于任何可能失效的 HTTP 链接。
          sudo git clone https://github.com/theos/sdks.git --depth 1 /tmp/sdks
          sudo mv /tmp/sdks/iPhoneOS15.5.sdk /opt/theos/sdks/
          sudo rm -rf /tmp/sdks
          
      # 步骤 4: 编译并打包 Tweak
      - name: Build and Package Tweak
        run: |
          cd Tweak
          make package -j$(sysctl -n hw.ncpu)
          
      # 步骤 5: 上传构建产物
      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS_UEDumper-deb
          path: Tweak/packages/*.deb
