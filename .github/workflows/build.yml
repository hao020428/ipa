name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Create Correct Makefile
        run: |
          cat > Tweak/Makefile << 'EOF'
          TARGET := iphone:clang:17.5:11.2
          ARCHS = arm64 arm64e
          THEOS_PACKAGE_SCHEME = rootless

          TWEAK_NAME = UEDumper

          # List ALL source files explicitly to avoid wildcard issues
          UEDumper_FILES = \
              src/Tweak.mm \
              src/Dumper.cpp \
              src/UPackageGenerator.cpp \
              src/UE/UEGameProfile.cpp \
              src/UE/UEMemory.cpp \
              src/UE/UEOffsets.cpp \
              src/UE/UEWrappers.cpp \
              src/Utils/AlertUtils.mm \
              src/Utils/BufferFmt.cpp \
              src/Utils/KittyAlertView.mm \
              ../deps/SSZipArchive/SSZipArchive.m

          # Add all required include paths and compiler flags for C++
          UEDumper_CXXFLAGS = \
              -I../deps/KittyMemory/KittyMemory \
              -I../deps/fmt \
              -I../deps/hash \
              -I../deps/nlohmann \
              -I../deps \
              -I../deps/SSZipArchive/minizip \
              -I../deps/utfcpp \
              -std=c++17 \
              -Wno-deprecated-declarations \
              -fobjc-arc-exceptions

          # Objective-C++ files also need the C++ flags
          UEDumper_OBJCXXFLAGS = $(UEDumper_CXXFLAGS)

          # Add minizip source files to be compiled with the tweak
          UEDumper_CFLAGS = \
              -I../deps/SSZipArchive/minizip
          UEDumper_FILES += \
              ../deps/SSZipArchive/minizip/mz_crypt.c \
              ../deps/SSZipArchive/minizip/mz_os.c \
              ../deps/SSZipArchive/minizip/mz_strm.c \
              ../deps/SSZipArchive/minizip/mz_zip.c \
              ../deps/SSZipArchive/minizip/mz_zip_rw.c \
              ../deps/SSZipArchive/minizip/mz_compat.c

          # Linker flags (if needed in the future)
          UEDumper_LDFLAGS =

          include $(THEOS)/makefiles/common.mk
          include $(THEOS)/makefiles/tweak.mk

          after-install::
          	install.exec "sbreload"
          EOF
        shell: bash

      - name: Build Tweak
        id: build
        run: |
          cd Tweak
          make all
          echo "tweak_path=$(ls -t packages/*.deb 2>/dev/null | head -n1)" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        if: steps.build.outputs.tweak_path
        uses: actions/upload-artifact@v4
        with:
          name: UEDumper-Debian-Package
          path: Tweak/${{ steps.build.outputs.tweak_path }} 
