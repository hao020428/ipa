# .github/workflows/build.yml

name: Build iOS_UEDumper Tweak

# 工作流触发条件
on:
  # 允许手动从 GitHub Actions 页面触发
  workflow_dispatch:

  # 当有代码推送到 main 分支时自动触发
  push:
    branches:
      - main
      - master

jobs:
  build:
    # 使用最新的 macOS 环境来运行作业
    runs-on: macos-latest

    steps:
      # 步骤 1: 检出代码
      # with: submodules: 'recursive' 会自动拉取所有子模块依赖
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 步骤 2: 安装 Theos 依赖
      # Theos 构建需要 ldid 和 xz
      - name: Install Dependencies
        run: |
          brew install ldid xz

      # 步骤 3: 安装 Theos 和 iOS SDK
      # 这个步骤现在更加健壮
      - name: Install Theos & SDK
        run: |
          # 克隆 Theos 到一个固定的、有权限的位置
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          
          # 设置 THEOS 环境变量，以便后续步骤使用
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          
          # 【修正点】使用 Theos 内置的工具来下载和安装 SDK
          # 这比手动 curl 和 unzip 可靠得多
          sudo /opt/theos/bin/install-sdk 16.4

      # 步骤 4: 编译并打包 Tweak
      # -j$(sysctl -n hw.ncpu) 会使用所有可用的 CPU核心来加速编译
      - name: Build and Package Tweak
        run: |
          cd Tweak
          make package -j$(sysctl -n hw.ncpu)
          
      # 步骤 5: 上传构建产物
      # 将生成的 .deb 文件作为可下载的产物上传
      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS_UEDumper-deb
          path: Tweak/packages/*.deb
