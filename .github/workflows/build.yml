# .github/workflows/build.yml

name: Build iOS_UEDumper Tweak

# 工作流触发条件
on:
  # 允许手动从 GitHub Actions 页面触发
  workflow_dispatch:

  # 当有代码推送到 main 分支时自动触发
  push:
    branches:
      - main
      - master

jobs:
  build:
    # 使用最新的 macOS 环境来运行作业
    runs-on: macos-latest

    steps:
      # 步骤 1: 检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 步骤 2: 安装 Theos 依赖
      - name: Install Dependencies
        run: |
          brew install ldid xz

      # 步骤 3: 安装 Theos 和 iOS SDK
      - name: Install Theos & SDK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 克隆 Theos
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          
          # 设置 THEOS 环境变量
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          
          # 【修正点】使用一个 Theos 官方确认存在的 SDK 版本 16.2
          sudo -E /opt/theos/bin/install-sdk 16.2

      # 步骤 4: 编译并打包 Tweak
      - name: Build and Package Tweak
        run: |
          cd Tweak
          make package -j$(sysctl -n hw.ncpu)
          
      # 步骤 5: 上传构建产物
      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS_UEDumper-deb
          path: Tweak/packages/*.deb
