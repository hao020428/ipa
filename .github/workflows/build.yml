name: Build iOS_UEDumper

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Install Dependencies
        run: |
          brew install ldid xz

      - name: Install Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Download Dependencies
        run: |
          rm -rf deps/KittyMemory
          git clone https://github.com/MJx0/KittyMemory.git deps/KittyMemory

      - name: Patch Makefile
        run: |
          sed -i '' 's|../deps/KittyMemory/KittyMemory|../deps/KittyMemory|g' Tweak/Makefile
      
      - name: Verify Makefile Patch
        run: |
          echo "--- Contents of Tweak/Makefile after patching ---"
          cat Tweak/Makefile
          echo "-------------------------------------------------"
          
      - name: Build Tweak
        run: |
          export THEOS=~/theos
          cd Tweak
          make package THEOS=~/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS_UEDumper-deb
          path: Tweak/packages/*.deb
