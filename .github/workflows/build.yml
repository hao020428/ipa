name: Build iOS UEDumper

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  build:
    runs-on: macos-latest  # 使用macOS运行器，因为这是iOS项目
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true  # 确保获取所有子模块
        fetch-depth: 0    # 获取完整历史
    
    - name: Ensure submodules are initialized
      run: |
        git submodule update --init --recursive
        # 检查KittyMemory是否已正确克隆
        if [ ! -f "deps/KittyMemory/KittyInclude.hpp" ] && [ -d "deps" ]; then
          echo "KittyMemory not properly cloned, manually cloning it"
          rm -rf deps/KittyMemory
          git clone https://github.com/MJx0/KittyMemory.git deps/KittyMemory
        fi
        
        # 列出所有KittyMemory目录内容
        find . -name "KittyMemory" -type d | xargs -I{} sh -c 'echo "Content of {}:"; ls -la {}'
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Install ldid
      run: brew install ldid
    
    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        brew install xz
        curl -LO https://github.com/theos/sdks/archive/master.zip
        unzip -q master.zip
        mkdir -p $HOME/theos/sdks
        mv sdks-master/*.sdk $HOME/theos/sdks/ || echo "No SDKs found"
        rm -rf sdks-master master.zip
    
    - name: Set up Theos environment
      run: |
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "THEOS_DEVICE_IP=127.0.0.1" >> $GITHUB_ENV
        echo "THEOS_DEVICE_PORT=2222" >> $GITHUB_ENV
        echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV
    
    - name: Prepare build environment
      run: |
        echo "Working directory: $(pwd)"
        echo "Directory structure:"
        find . -type d -maxdepth 3 | sort
        
        # 检查原始项目结构和文件内容
        find Tweak -name "*.hpp" | grep Progress || echo "No Progress header files found"
        
        # 确保src/Utils目录存在
        mkdir -p Tweak/src/Utils
        
        # 创建符号链接而不是替换现有文件
        cd Tweak
        rm -f Utils
        ln -sf src/Utils Utils
        cd ..
        
        echo "Project structure after preparation:"
        find Tweak -type f | sort

    - name: Configure build
      run: |
        # 创建临时Makefile确保包含所有必要路径
        if [ -f "Tweak/Makefile" ]; then
          echo "" >> Tweak/Makefile
          echo "# Added by GitHub Actions" >> Tweak/Makefile
          echo "UEDumper_CFLAGS += -IUtils -I./src -I./src/Utils" >> Tweak/Makefile
          echo "UEDumper_CCFLAGS += -IUtils -I./src -I./src/Utils" >> Tweak/Makefile
          echo "Modified Makefile:"
          cat Tweak/Makefile
        fi

        # 检查现有的ProgressUtils.hpp内容
        if [ -f "Tweak/src/Utils/ProgressUtils.hpp" ]; then
          echo "Original ProgressUtils.hpp content:"
          cat Tweak/src/Utils/ProgressUtils.hpp | grep -A 2 "class SimpleProgressBar"
          cat Tweak/src/Utils/ProgressUtils.hpp | grep -A 2 "getPercentage"
        else
          echo "Warning: ProgressUtils.hpp not found in expected location"
        fi

    - name: Build project
      run: |
        cd Tweak
        echo "Building from directory: $(pwd)"
        ls -la
        ls -la src
        ls -la src/Utils
        make clean || echo "Clean failed, continuing anyway"
        
        # 尝试构建
        make package || {
          echo "Build attempt failed, checking for errors"
          # 检查前置文件
          find . -name "*.i" -exec cat {} \; 2>/dev/null | grep -A 5 -B 5 "ProgressUtils" || echo "No preprocessed files with ProgressUtils found"
          # 检查任何编译错误
          echo "Build failed"
          exit 1
        }
        
        # 检查是否有deb文件生成及其位置
        echo "Looking for deb files..."
        find $(pwd) -name "*.deb" || echo "No .deb files found directly"
        find $(pwd)/.. -name "*.deb" || echo "No .deb files found one level up"
        
        # 创建输出目录
        mkdir -p packages
        # 尝试找到并复制deb文件到已知位置
        if [ -d ".theos/obj/debug/deb" ]; then
          cp .theos/obj/debug/deb/*.deb packages/ || echo "No debug debs found"
        fi
        if [ -d ".theos/obj/deb" ]; then
          cp .theos/obj/deb/*.deb packages/ || echo "No release debs found"
        fi
        
        # 如果找到deb文件，列出它们
        if [ -d "packages" ]; then
          echo "Contents of packages directory:"
          ls -la packages/
        fi
    
    - name: Create UEDumper.plist if needed
      run: |
        # 检查是否存在Filter.plist文件，如果不存在则创建一个
        if [ ! -f "Tweak/UEDumper.plist" ] && [ ! -f "Tweak/Filter.plist" ]; then
          echo "Creating UEDumper.plist file..."
          cat > Tweak/UEDumper.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Filter</key>
              <dict>
                  <key>Bundles</key>
                  <array>
                      <string>com.apple.UIKit</string>
                  </array>
                  <key>Executables</key>
                  <array>
                      <string>UE4Game</string>
                      <string>UEGame</string>
                  </array>
                  <key>Classes</key>
                  <array>
                      <string>UIApplication</string>
                  </array>
              </dict>
          </dict>
          </plist>
          EOF
          
          echo "Created UEDumper.plist:"
          cat Tweak/UEDumper.plist
        else
          echo "Filter plist file already exists"
        fi

    - name: Archive production artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: UEDumper-package
        path: |
          Tweak/packages/*.deb
          Tweak/.theos/obj/debug/deb/*.deb
          Tweak/.theos/obj/deb/*.deb
          **/UEDumper*.deb
        if-no-files-found: warn
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/UEDumper*.deb
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false 
