name: Build iOS UEDumper

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  build:
    runs-on: macos-latest  # 使用macOS运行器，因为这是iOS项目
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true  # 确保获取所有子模块
        fetch-depth: 0    # 获取完整历史
    
    - name: Ensure submodules are initialized
      run: |
        git submodule update --init --recursive
        # 检查KittyMemory是否已正确克隆
        if [ ! -f "deps/KittyMemory/KittyInclude.hpp" ] && [ -d "deps" ]; then
          echo "KittyMemory not properly cloned, manually cloning it"
          rm -rf deps/KittyMemory
          git clone https://github.com/MJx0/KittyMemory.git deps/KittyMemory
        fi
        
        # 列出所有KittyMemory目录内容
        find . -name "KittyMemory" -type d | xargs -I{} sh -c 'echo "Content of {}:"; ls -la {}'
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Install ldid
      run: brew install ldid
    
    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        brew install xz
        curl -LO https://github.com/theos/sdks/archive/master.zip
        unzip -q master.zip
        mkdir -p $HOME/theos/sdks
        mv sdks-master/*.sdk $HOME/theos/sdks/ || echo "No SDKs found"
        rm -rf sdks-master master.zip
    
    - name: Set up Theos environment
      run: |
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "THEOS_DEVICE_IP=127.0.0.1" >> $GITHUB_ENV
        echo "THEOS_DEVICE_PORT=2222" >> $GITHUB_ENV
        echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV
    
    - name: Prepare build environment
      run: |
        echo "Working directory: $(pwd)"
        echo "Directory structure:"
        find . -type d -maxdepth 3 | sort
        
        # 检查原始包含关系
        if [ -f "Tweak/src/Dumper.hpp" ]; then
          echo "Original ProgressCallback definition in Dumper.hpp:"
          grep -A 2 "ProgressCallback" Tweak/src/Dumper.hpp
        fi
        
        # 创建一个与实际需求匹配的ProgressUtils.hpp文件
        mkdir -p Tweak/src/Utils
        
        # 写入正确的ProgressUtils实现
        cat > Tweak/src/Utils/ProgressUtils.hpp << 'EOF'
        #pragma once
        #include <iostream>
        #include <functional>

        class SimpleProgressBar {
        private:
            int _max;
            int _current;
            int _lastPercent;
        
        public:
            SimpleProgressBar(int max) : _max(max), _current(0), _lastPercent(0) {}
            
            void update(int val) {
                _current = val;
                _lastPercent = static_cast<int>((_current * 100.0) / _max);
            }
            
            int getPercentage() const {
                return _lastPercent;
            }
            
            // 添加++运算符重载
            SimpleProgressBar& operator++() {
                // 前缀++
                if (_current < _max) {
                    _current++;
                    _lastPercent = static_cast<int>((_current * 100.0) / _max);
                }
                return *this;
            }
            
            SimpleProgressBar operator++(int) {
                // 后缀++
                SimpleProgressBar tmp(*this);
                if (_current < _max) {
                    _current++;
                    _lastPercent = static_cast<int>((_current * 100.0) / _max);
                }
                return tmp;
            }
            
            // 可能还需要其他运算符
            operator int() const {
                return _current;
            }
        };
        
        // 使用std::function作为回调类型，以匹配Dumper.hpp中的定义
        using ProgressCallback = std::function<void(const SimpleProgressBar&)>;
        EOF
        
        # 修复符号链接
        cd Tweak
        rm -f Utils
        ln -sf src/Utils Utils
        cd ..
        
        echo "Updated directory structure:"
        find Tweak -type f | sort
        
        # 检查新创建的文件
        echo "Contents of new ProgressUtils.hpp:"
        cat Tweak/src/Utils/ProgressUtils.hpp
        
        # 创建必要的Filter.plist文件
        cat > Tweak/UEDumper.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>Filter</key>
            <dict>
                <key>Bundles</key>
                <array>
                    <string>com.apple.UIKit</string>
                </array>
                <key>Executables</key>
                <array>
                    <string>UE4Game</string>
                    <string>UEGame</string>
                </array>
                <key>Classes</key>
                <array>
                    <string>UIApplication</string>
                </array>
            </dict>
        </dict>
        </plist>
        EOF
        
        echo "Created UEDumper.plist:"
        cat Tweak/UEDumper.plist

    - name: Configure build
      run: |
        # 创建临时Makefile确保包含所有必要路径
        if [ -f "Tweak/Makefile" ]; then
          echo "" >> Tweak/Makefile
          echo "# Added by GitHub Actions" >> Tweak/Makefile
          echo "UEDumper_CFLAGS += -IUtils -I./src -I./src/Utils" >> Tweak/Makefile
          echo "UEDumper_CCFLAGS += -IUtils -I./src -I./src/Utils" >> Tweak/Makefile
          echo "Modified Makefile:"
          cat Tweak/Makefile
        fi

    - name: Build project
      run: |
        cd Tweak
        echo "Building from directory: $(pwd)"
        ls -la
        ls -la src
        ls -la src/Utils
        make clean || echo "Clean failed, continuing anyway"
        
        # 尝试构建
        make package || {
          echo "First build attempt failed, checking for more errors"
          # 检查汇编错误
          find . -name "*.s" -exec cat {} \; 2>/dev/null || echo "No assembly files found"
          # 检查前置文件
          find . -name "*.i" -exec cat {} \; 2>/dev/null | grep -A 5 -B 5 "ProgressUtils" || echo "No preprocessed files with ProgressUtils found"
          echo "Build failed"
          exit 1
        }
        
        # 详细调查deb文件生成情况
        echo "Theos Package Build Structure:"
        find .theos -type d | sort
        
        # 检查是否有deb文件生成及其位置（全系统搜索）
        echo "Looking for all deb files in workspace..."
        find /Users/runner/work/ipa -name "*.deb" -type f || echo "No .deb files found in workspace"
        
        # 检查build过程的输出 - 看看deb文件应该在哪里
        echo "Checking for package stage directory..."
        find .theos -name "stage" -type d | xargs ls -la || echo "No stage directory found"
        
        # 手动创建一个测试deb文件，确保上传路径正常工作
        mkdir -p packages
        touch packages/test-package.deb
        echo "Created test file:"
        ls -la packages/
        
        # 创建输出目录并递归复制所有找到的deb
        mkdir -p ../output-debs
        find /Users/runner/work/ipa -name "*.deb" -type f -exec cp {} ../output-debs/ \; || echo "No debs to copy"
        echo "Contents of output-debs directory:"
        ls -la ../output-debs/ || echo "Output directory empty or not found"
    
    - name: Search for DEB files
      id: find_debs
      run: |
        echo "Searching for DEB files in the entire workspace..."
        find $GITHUB_WORKSPACE -name "*.deb" -type f
    
    - name: Archive production artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: UEDumper-package
        path: |
          ${{ github.workspace }}/Tweak/packages/*.deb
          ${{ github.workspace }}/output-debs/*.deb
        if-no-files-found: warn
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/packages/*.deb
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false 
