name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Create Correct Makefile
        run: |
          cat > Tweak/Makefile << 'EOF'
          TARGET := iphone:clang:17.5:11.2
          ARCHS = arm64 arm64e
          THEOS_PACKAGE_SCHEME = rootless

          TWEAK_NAME = UEDumper

          # List ALL source files explicitly to avoid wildcard issues
          UEDumper_FILES = \
              src/Tweak.mm \
              src/Dumper.cpp \
              src/UPackageGenerator.cpp \
              src/UE/UEGameProfile.cpp \
              src/UE/UEMemory.cpp \
              src/UE/UEOffsets.cpp \
              src/UE/UEWrappers.cpp \
              src/Utils/AlertUtils.mm \
              src/Utils/BufferFmt.cpp \
              src/Utils/KittyAlertView.mm \
              ../deps/SSZipArchive/SSZipArchive.m

          # Use += to append flags and build absolute paths to ensure they are not ignored by Theos.
          # This is the most robust way to declare compiler flags.
          ABSOLUTE_DEPS_PATH = $(THEOS_PROJECT_DIR)/../deps

          export COMMON_FLAGS = \
              -std=c++17 \
              -Wno-deprecated-declarations \
              -fobjc-arc-exceptions \
              -I"$(ABSOLUTE_DEPS_PATH)/KittyMemory/KittyMemory" \
              -I"$(ABSOLUTE_DEPS_PATH)/fmt" \
              -I"$(ABSOLUTE_DEPS_PATH)/hash" \
              -I"$(ABSOLUTE_DEPS_PATH)/nlohmann" \
              -I"$(ABSOLUTE_DEPS_PATH)/SSZipArchive/minizip" \
              -I"$(ABSOLUTE_DEPS_PATH)/utfcpp" \
              -I"$(ABSOLUTE_DEPS_PATH)"

          UEDumper_CXXFLAGS += $(COMMON_FLAGS)
          UEDumper_OBJCXXFLAGS += $(COMMON_FLAGS)
          UEDumper_OBJCFLAGS += $(COMMON_FLAGS)

          # Add minizip source files to be compiled with the tweak
          UEDumper_CFLAGS += -I"$(ABSOLUTE_DEPS_PATH)/SSZipArchive/minizip"
          UEDumper_FILES += \
              $(ABSOLUTE_DEPS_PATH)/SSZipArchive/minizip/mz_crypt.c \
              $(ABSOLUTE_DEPS_PATH)/SSZipArchive/minizip/mz_os.c \
              $(ABSOLUTE_DEPS_PATH)/SSZipArchive/minizip/mz_strm.c \
              $(ABSOLUTE_DEPS_PATH)/SSZipArchive/minizip/mz_zip.c \
              $(ABSOLUTE_DEPS_PATH)/SSZipArchive/minizip/mz_zip_rw.c \
              $(ABSOLUTE_DEPS_PATH)/SSZipArchive/minizip/mz_compat.c
          
          # Linker flags (if needed in the future)
          UEDumper_LDFLAGS =

          include $(THEOS)/makefiles/common.mk
          include $(THEOS)/makefiles/tweak.mk

          after-install::
          	install.exec "sbreload"
          EOF
        shell: bash

      - name: Debug Build Environment
        run: |
          echo "--- Final Tweak/Makefile content ---"
          cat Tweak/Makefile
          echo "--- Recursive file list from Tweak/ directory ---"
          ls -laR Tweak/
          echo "------------------------------------------------"
        shell: bash

      - name: Build Tweak
        id: build
        run: |
          cd Tweak
          make clean all messages=yes
          echo "tweak_path=$(ls -t packages/*.deb 2>/dev/null | head -n1)" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        if: steps.build.outputs.tweak_path
        uses: actions/upload-artifact@v4
        with:
          name: UEDumper-Debian-Package
          path: Tweak/${{ steps.build.outputs.tweak_path }} 
