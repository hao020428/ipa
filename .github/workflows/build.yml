name: Build iOS_UEDumper

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Install Build Tools
        run: |
          brew install ldid xz

      - name: Install Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Force Download All Dependencies
        run: |
          # Force init all git submodules (like SSZipArchive)
          git submodule update --init --recursive
          # Manually clone KittyMemory as it's not a submodule
          rm -rf deps/KittyMemory
          git clone https://github.com/MJx0/KittyMemory.git deps/KittyMemory

      - name: Verify Dependencies are Present
        run: |
          echo "--- Verifying contents of deps directory ---"
          ls -R deps
          echo "------------------------------------------"
          
      - name: Build Tweak
        run: |
          export THEOS=~/theos
          cd Tweak
          make package THEOS=~/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS_UEDumper-deb
          path: Tweak/packages/*.deb
