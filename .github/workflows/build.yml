# .github/workflows/build.yml

name: Build iOS_UEDumper Tweak

# 工作流触发条件
on:
  # 允许手动从 GitHub Actions 页面触发
  workflow_dispatch:

  # 当有代码推送到 main 分支时自动触发
  push:
    branches:
      - main
      - master

jobs:
  build:
    # 使用最新的 macOS 环境来运行作业
    runs-on: macos-latest

    steps:
      # 步骤 1: 检出代码
      # 使用 actions/checkout@v4 来获取你的代码
      # with: submodules: 'recursive' 是关键，它会自动拉取所有子模块依赖
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 步骤 2: 安装 Theos 依赖
      # Theos 构建需要 ldid 和 xz
      - name: Install Dependencies
        run: |
          brew install ldid xz

      # 步骤 3: 安装 Theos 和 iOS SDK
      # 这会将 Theos 克隆到 /opt/theos，并下载一个可用的 iOS SDK
      - name: Install Theos & SDK
        run: |
          # 克隆 Theos
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          
          # 设置 THEOS 环境变量，以便后续步骤使用
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          
          # 为 Theos SDK 准备目录
          sudo mkdir -p /opt/theos/sdks
          
          # 下载并解压一个常用的 iOS SDK（例如 iOS 16.4）
          curl -LO https://github.com/theos/sdks/archive/refs/tags/16.4.zip
          unzip 16.4.zip
          sudo mv sdks-16.4/*.sdk /opt/theos/sdks/
          rm -rf sdks-16.4 16.4.zip

      # 步骤 4: 编译并打包 Tweak
      # 'make package' 会执行清理、编译和打包
      - name: Build and Package Tweak
        run: |
          cd Tweak
          make package -j$(sysctl -n hw.ncpu)
          
      # 步骤 5: 上传构建产物
      # 将生成的 .deb 文件作为可下载的产物上传
      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS_UEDumper-deb
          path: Tweak/packages/*.deb
