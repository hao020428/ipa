name: Build iOS UEDumper

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  build:
    runs-on: macos-latest  # 使用macOS运行器，因为这是iOS项目
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'  # 确保获取所有子模块
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'  # 更新为更新版本的Xcode
    
    - name: Install dependencies
      run: |
        brew install ldid  # 用于签名iOS二进制文件
        brew install theos/tap/theos  # 安装Theos (用于越狱iOS开发)
    
    - name: Set up Theos environment
      run: |
        export THEOS=$(brew --prefix theos)
        echo "THEOS=$THEOS" >> $GITHUB_ENV
        echo "THEOS_DEVICE_IP=127.0.0.1" >> $GITHUB_ENV
        echo "THEOS_DEVICE_PORT=2222" >> $GITHUB_ENV
    
    - name: Build project
      run: |
        cd iOS_UEDumper-main/Tweak
        make package
    
    - name: Archive production artifacts
      uses: actions/upload-artifact@v4  # 更新到v4版本
      with:
        name: UEDumper-package
        path: |
          iOS_UEDumper-main/Tweak/packages/*.deb
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      id: create_release
      uses: softprops/action-gh-release@v2  # 使用更现代的release action
      with:
        files: |
          iOS_UEDumper-main/Tweak/packages/*.deb
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false 
