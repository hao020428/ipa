name: Build iOS_UEDumper

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Build Dependencies
        run: |
          brew install ldid xz make

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Download Missing KittyMemory Dependency
        run: |
          rm -rf deps/KittyMemory
          git clone https://github.com/MJx0/KittyMemory.git deps/KittyMemory
      
      - name: Force Overwrite Makefile
        env:
          MAKEFILE_CONTENT: |
            TARGET := iphone:clang:latest:14.0
            ARCHS = arm64 arm64e
            THEOS_PACKAGE_SCHEME = rootless

            include $(THEOS)/makefiles/common.mk

            TWEAK_NAME = UEDumper

            DEPS_PATH = ../deps
            KITTYMEMORY_PATH = $(DEPS_PATH)/KittyMemory

            # Source Files
            KITTYMEMORY_SRC = $(wildcard $(KITTYMEMORY_PATH)/*.cpp)
            MINIZIP_SRC = $(wildcard $(DEPS_PATH)/SSZipArchive/minizip/*.c)
            DEPS_SRC = $(KITTYMEMORY_SRC) $(DEPS_PATH)/fmt/format.cc $(DEPS_PATH)/SSZipArchive/SSZipArchive.m $(MINIZIP_SRC)

            TWEAK_SRC_FILES = \
            	src/Tweak.mm \
            	src/Dumper.cpp \
            	src/UPackageGenerator.cpp \
            	src/Utils/AlertUtils.mm \
            	src/Utils/KittyAlertView.mm \
            	src/Utils/BufferFmt.cpp \
            	$(wildcard src/UE/*.cpp)

            $(TWEAK_NAME)_FILES = $(TWEAK_SRC_FILES) $(DEPS_SRC)

            # Compiler Flags
            COMMON_INCLUDES = -Isrc -I$(DEPS_PATH) -I$(DEPS_PATH)/KittyMemory -I$(DEPS_PATH)/SSZipArchive
            $(TWEAK_NAME)_CXXFLAGS = -std=c++17 -fobjc-arc -O2 -Wno-deprecated-declarations -Wno-unused-function $(COMMON_INCLUDES)
            $(TWEAK_NAME)_OBJCXXFLAGS = $($(TWEAK_NAME)_CXXFLAGS)
            $(TWEAK_NAME)_CFLAGS = -fobjc-arc -Wno-deprecated-declarations -Wno-unused-function $(COMMON_INCLUDES) -DHAVE_INTTYPES_H -DHAVE_PKCRYPT -DHAVE_STDINT_H -DHAVE_WZAES -DHAVE_ZLIB
            
            # Linker Flags
            $(TWEAK_NAME)_LDFLAGS = -lz -liconv -ldl
            $(TWEAK_NAME)_FRAMEWORKS = UIKit Foundation Security Network QuartzCore

            include $(THEOS_MAKE_PATH)/tweak.mk
        run: echo "$MAKEFILE_CONTENT" > Tweak/Makefile
      
      - name: ULTIMATE DEBUG - Show Final File System Layout
        run: |
          echo "--- Current Working Directory: $(pwd) ---"
          echo "--- Full recursive file listing ---"
          ls -laR
          echo "-----------------------------------"

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          cd Tweak
          gmake package THEOS=~/theos -j$(sysctl -n hw.ncpu)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UEDumper-deb
          path: Tweak/packages/*.deb
