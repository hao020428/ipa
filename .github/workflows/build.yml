# .github/workflows/build.yml

name: Build iOS_UEDumper Tweak

# 工作流触发条件
on:
  # 允许手动从 GitHub Actions 页面触发
  workflow_dispatch:

  # 当有代码推送到 main 分支时自动触发
  push:
    branches:
      - main
      - master

jobs:
  build:
    # 使用最新的 macOS 环境来运行作业
    runs-on: macos-latest

    steps:
      # 步骤 1: 检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 步骤 2: 安装 Theos 依赖
      - name: Install Dependencies
        run: |
          brew install ldid xz

      # 步骤 3: 安装 Theos 和 iOS SDK (稳定方法)
      - name: Install Theos & SDK (Stable Method)
        run: |
          # 克隆 Theos
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          
          # 设置 THEOS 环境变量
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          
          # 【修正点】彻底放弃不稳定的 install-sdk 脚本。
          # 改为从一个可靠的源手动下载一个确认可用的 SDK (iOS 14.5)。
          # 这将从根本上解决 SDK 版本不存在的问题。
          SDK_URL="https://github.com/xybp888/iOS-SDKs/releases/download/14.5/iPhoneOS14.5.sdk.tar.xz"
          
          # 下载 SDK
          curl -L "$SDK_URL" -o iPhoneOS.sdk.tar.xz
          
          # 为 SDK 创建目录
          sudo mkdir -p /opt/theos/sdks
          
          # 解压 SDK 到 Theos 的目录
          sudo tar -xf iPhoneOS.sdk.tar.xz -C /opt/theos/sdks/
          
          # 清理下载的文件
          rm iPhoneOS.sdk.tar.xz

      # 步骤 4: 编译并打包 Tweak
      - name: Build and Package Tweak
        run: |
          cd Tweak
          make package -j$(sysctl -n hw.ncpu)
          
      # 步骤 5: 上传构建产物
      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS_UEDumper-deb
          path: Tweak/packages/*.deb
